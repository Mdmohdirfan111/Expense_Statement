<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Bill Summary</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</head>

<body>

<div class="container" id="billArea">

    <div class="header">

        <h1><i class="fa-solid fa-route"></i> Travel Bill Summary</h1>

        <p>Fare & Expense Statement</p>

    </div>

    <!-- Information -->

    <div class="info-grid">

        <div class="input-group">
            <label>Month</label>
            <input type="month" id="month">
        </div>

        <div class="input-group">
            <label>Route</label>
            <input type="text"
            id="route"
            placeholder="Enter Route">
        </div>

        <div class="input-group">
            <label>Vehicle Number</label>
            <input type="text"
            id="vehicle"
            placeholder="TS09AB1234">
        </div>

    </div>

    <!-- Table -->

    <div class="table-wrapper">

<table id="expenseTable">

<thead>

<tr>

<th width="40%">Particulars</th>

<th width="20%">Rate (₹)</th>

<th width="15%">Qty</th>

<th width="20%">Amount (₹)</th>

<th width="5%">Action</th>

</tr>

</thead>

<tbody>

<tr>

<td>
<input type="text" value="Kilometer Run">
</td>

<td>
<input class="rate" type="number">
</td>

<td>
<input class="qty" type="number">
</td>

<td>
<input class="amount" readonly>
</td>

<td></td>

</tr>

<tr>

<td>
<input type="text" value="Package">
</td>

<td>
<input class="rate" type="number">
</td>

<td>
<input class="qty" type="number">
</td>

<td>
<input class="amount" readonly>
</td>

<td></td>

</tr>

<tr>

<td>
<input type="text" value="Toll">
</td>

<td>
<input class="rate" type="number">
</td>

<td>
<input class="qty" type="number">
</td>

<td>
<input class="amount" readonly>
</td>

<td></td>

</tr>

</tbody>

</table>

</div>

<!-- Buttons -->

<div class="button-area">

<button id="addRow">

<i class="fa-solid fa-plus"></i>

Add Row

</button>

<button id="downloadPdf">

<i class="fa-solid fa-file-pdf"></i>

Download PDF

</button>

</div>

<!-- Summary -->

<div class="summary">

<div class="summary-row">

<label>Total Amount</label>

<input
type="number"
id="total"
readonly>

</div>

<div class="summary-row">

<label>Advance Received</label>

<input
type="number"
id="advance">

</div>

<div class="summary-row balance">

<label>Balance Due</label>

<input
type="number"
id="balance"
readonly>

</div>

</div>

<footer>

Designed with ❤️ for Travel Expense Management

</footer>

</div>

<script src="script.js"></script>

</body>
</html>
